<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>grok play · imagine</title>
  <script src="https://cdn.jsdelivr.net/npm/@theatre/core@0.7.2/dist/index.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-monospace, Menlo, monospace;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: grid;
      grid-template-columns: 200px 1fr 280px;
      overflow: hidden;
    }
    .side { background: #161b22; border-right: 1px solid #30363d; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .side.right { border-right: none; border-left: 1px solid #30363d; }
    .logo { font-weight: 700; color: #58a6ff; font-size: 0.85rem; margin-bottom: 8px; }
    .nav button {
      width: 100%; text-align: left; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #30363d; background: #21262d; color: #8b949e; cursor: pointer; font: inherit; font-size: 0.72rem;
    }
    .nav button.active { border-color: #58a6ff; color: #58a6ff; background: #1f2a3a; }
    .main { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
    .preview {
      flex: 1; background: #010409; border: 1px solid #30363d; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
    }
    #output-image { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
    .placeholder { color: #484f58; font-size: 0.75rem; text-align: center; padding: 20px; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 0.62rem; color: #6e7681; }
    input[type="range"] { width: 100%; }
    textarea, input[type="text"] {
      width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; font: inherit; font-size: 0.72rem; padding: 8px;
    }
    .btn {
      padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d; background: #21262d;
      color: #c9d1d9; cursor: pointer; font: inherit; font-size: 0.72rem;
    }
    .btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
    .status { font-size: 0.62rem; color: #6e7681; min-height: 1.2em; }
    .panel { display: none; flex-direction: column; gap: 8px; }
    .panel.active { display: flex; }
  </style>
</head>
<body>
  <aside class="side">
    <div class="logo">grok play</div>
    <nav class="nav">
      <button type="button" class="active" data-tab="imagine">imagine</button>
      <button type="button" data-tab="params">params</button>
      <button type="button" data-tab="notes">notes</button>
    </nav>
  </aside>
  <main class="main">
    <div class="preview">
      <img id="output-image" alt="generated" />
      <div class="placeholder" id="ph">prompt + generate (Ctrl+Enter) · wired to qbpm imagine</div>
    </div>
    <div class="status" id="status">ready</div>
  </main>
  <aside class="side right">
    <div class="panel active" data-panel="imagine">
      <label>prompt<textarea id="prompt" rows="5" placeholder="describe image…"></textarea></label>
      <button type="button" class="btn primary" id="btn-gen">generate ↵</button>
    </div>
    <div class="panel" data-panel="params">
      <label>intensity <input type="range" id="intensity" min="0" max="100" value="60" /><span id="v-int">60</span></label>
      <label>surreal <input type="range" id="surreal" min="0" max="100" value="40" /><span id="v-sur">40</span></label>
      <label>cinematic <input type="range" id="cinematic" min="0" max="100" value="50" /><span id="v-cin">50</span></label>
      <button type="button" class="btn" id="btn-save-seq">save to sequence</button>
    </div>
    <div class="panel" data-panel="notes">
      <label>generation notes<textarea id="notes" rows="10" readonly></textarea></label>
    </div>
  </aside>
  <script src="./grok-playground.js"></script>
</body>
</html>
