<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>blank ingest — qbpm</title>
  <style>
    body { font-family: ui-monospace, Menlo, monospace; background: #0d1117; color: #c9d1d9; padding: 12px; }
    input, button { font: inherit; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #c9d1d9; }
    button { cursor: pointer; }
    pre { background: #161b22; border: 1px solid #30363d; padding: 10px; font-size: 0.7rem; overflow: auto; max-height: 50vh; }
  </style>
</head>
<body>
  <h1>blank ingest</h1>
  <p>yt-dlp · ffmpeg · ffplay — <a href="https://github.com/fornevercollective/blank" style="color:#58a6ff">blank</a></p>
  <input id="url" type="url" placeholder="paste watch URL" style="width:100%;margin-bottom:8px" />
  <button id="resolve">resolve</button>
  <button id="cmds">commands</button>
  <pre id="out">ready</pre>
  <script>
    const out = document.getElementById("out");
    document.getElementById("resolve").onclick = async () => {
      const url = document.getElementById("url").value.trim();
      const res = await fetch("/api/video/resolve", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ url }) });
      out.textContent = JSON.stringify(await res.json(), null, 2);
    };
    document.getElementById("cmds").onclick = async () => {
      const url = document.getElementById("url").value.trim();
      const res = await fetch(`/api/video/commands?url=${encodeURIComponent(url)}`);
      out.textContent = JSON.stringify(await res.json(), null, 2);
    };
  </script>
</body>
</html>
