name: Deploy qbpm to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build static shell
        run: |
          mkdir -p _site/static
          cp -r web/* _site/static/
          cp web/index.html _site/index.html
          cp web/manifest.webmanifest _site/manifest.webmanifest
          cp web/sw.js _site/sw.js
          # Project pages at qbitos.github.io/qbpm — relative paths (root CNAME is qbitOS.github.io)
          for f in _site/index.html _site/sw.js; do
            sed -i 's|/static/|./static/|g' "$f" 2>/dev/null || \
              sed -i '' 's|/static/|./static/|g' "$f"
            sed -i 's|href="/manifest|href="./manifest|g' "$f" 2>/dev/null || \
              sed -i '' 's|href="/manifest|href="./manifest|g' "$f"
            sed -i 's|register("/sw.js")|register("./sw.js")|g' "$f" 2>/dev/null || \
              sed -i '' 's|register("/sw.js")|register("./sw.js")|g' "$f"
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4