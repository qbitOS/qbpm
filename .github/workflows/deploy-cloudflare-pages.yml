name: Deploy Cloudflare Pages (qbpm.qbitos.ai)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "graphs/**"
      - "deploy/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install wrangler
        run: npm ci || npm install

      - name: Build cloudflare variant
        run: |
          chmod +x deploy/build-static.sh
          VARIANT=cloudflare ./deploy/build-static.sh

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skip Cloudflare deploy — add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets"
            exit 0
          fi
          npx wrangler pages deploy _site --project-name=qbpm --branch=main